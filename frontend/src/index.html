<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Electron + Spring Boot</title>
  <!-- Linking the stylesheet -->
  <link rel="stylesheet" href="../assets/styles.css"/>
</head>
<body>

<h1>Spring Boot + Electron</h1>

<!-- Button to fetch data from the backend -->
<button>Fetch Data</button>

<!-- Placeholder for displaying the server response -->
<p id="response"></p>


<!-- Button to fetch user data from backend -->
<button id="fetchUsers">Pobierz użytkowników</button>

<!-- List of users -->
<ul id="usersList"></ul>

<script>
  // Event listener on button
  document.addEventListener("DOMContentLoaded", async () => {
    // Checking if api is available
    if (!window.api || !window.api.getApiUrl) {
      console.error("API bridge not available");
      return;
    }

    const apiUrl = await window.api.getApiUrl();
    // Function to fetch data from the Spring Boot server
    function fetchData() {
      // Informing the user that data retrieval has started
      document.getElementById("response").innerText = "Fetching data...";
      // Sending an HTTP request to the local server running on port 8080 by using .env file
      fetch(apiUrl + "/home/hello")
              .then(response => {
                if (!response.ok) {
                  throw new Error("Network response was not ok");
                }
                return response.text(); // Reading the response as text
              })
              .then(data => document.getElementById("response").innerText = data) // Displaying the retrieved data inside the <p> element
              .catch(error => {
                // Handling errors and displaying a message to the user
                console.error("Error:", error);
                document.getElementById("response").innerText = "Error fetching data: " + error.message;
              });
    }

    document.querySelector("button").addEventListener("click", fetchData);
  });

  document.addEventListener("DOMContentLoaded", async () => {
    // Check if the API bridge is available in the preload script
    if (!window.api || !window.api.fetchUsers) {
      console.error("API bridge not available");
      return;
    }

    // Function to fetch users from the backend and update the UI
    async function fetchUsers() {
      // Show a loading message while fetching data
      document.getElementById("usersList").innerHTML = "<li>Loading...</li>";

      try {
        // Call the API function from the preload script
        const users = await window.api.fetchUsers();

        // Update the user list in the UI
        document.getElementById("usersList").innerHTML = users.length
                ? users.map(user => `<li>${user.username} - ${user.email}</li>`).join("")
                : "<li>No users found</li>";
      } catch (error) {
        // Handle errors if the API call fails
        console.error("Error fetching users:", error);
        document.getElementById("usersList").innerHTML = "<li>Error fetching data</li>";
      }
    }

    // Attach the fetchUsers function to the button click event
    document.getElementById("fetchUsers").addEventListener("click", fetchUsers);
  });

</script>

</body>
</html>
